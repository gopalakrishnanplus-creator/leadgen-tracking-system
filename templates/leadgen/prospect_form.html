{% extends "base.html" %}
{% block title %}{{ title|default:"Add Prospect" }}{% endblock %}
{% block content %}
<section class="panel form-panel">
    <p class="eyebrow">{{ eyebrow|default:"Lead gen" }}</p>
    <h1>{{ title|default:"Add prospect" }}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button button-primary" type="submit">{{ submit_label|default:"Submit for review" }}</button>
    </form>
</section>
{% endblock %}
