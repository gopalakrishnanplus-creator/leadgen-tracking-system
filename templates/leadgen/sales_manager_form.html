{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<section class="panel form-panel">
    <p class="eyebrow">Supervisor</p>
    <h1>{{ title }}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button button-primary" type="submit">Save</button>
    </form>
</section>
{% endblock %}
