name: Send Invoice Due Notifications

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Send today's unsent invoice notifications immediately, even before 9 AM IST"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  id-token: write
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::736616688306:role/GitHubActionsLeadgenDeployRole
          aws-region: ap-south-1

      - name: Send invoice due notifications via SSM
        shell: bash
        run: |
          set -e

          FORCE_ARG=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE_ARG="--force"
          fi

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-042b772db54dd2178" \
            --document-name "AWS-RunShellScript" \
            --comment "Send Leadgen invoice due notifications" \
            --parameters "{\"commands\":[
              \"set -e\",
              \"git config --system --add safe.directory /var/www/leadgen-tracking-system\",
              \"cd /var/www/leadgen-tracking-system\",
              \"git fetch origin\",
              \"git reset --hard origin/main\",
              \"/var/www/.venv/bin/python manage.py send_invoice_due_notifications ${FORCE_ARG}\"
            ]}" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "i-042b772db54dd2178" || true

          aws ssm list-command-invocations \
            --command-id "$COMMAND_ID" \
            --details

          STATUS=$(aws ssm list-command-invocations \
            --command-id "$COMMAND_ID" \
            --query "CommandInvocations[0].Status" \
            --output text)

          echo "SSM Status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            echo "Invoice notification command failed"
            exit 1
          fi
